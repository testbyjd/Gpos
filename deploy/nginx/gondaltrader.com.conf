# GPOS — Nginx site (Ubuntu bare-metal).
# Installed by deploy/install.sh → /etc/nginx/sites-available/gondaltrader.com

upstream gpos_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name gondaltrader.com www.gondaltrader.com;

    # certbot --nginx adds listen 443 ssl and redirects here.

    client_max_body_size 20m;

    # ---- Laravel API (/api/v1/...) ----
    location ^~ /api/ {
        root /opt/gpos/backend/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/index\.php$ {
        root /opt/gpos/backend/public;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/gpos/backend/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    # ---- Next.js POS + admin (basePath /pos) ----
    location = /pos {
        return 301 /pos/;
    }

    location ^~ /pos/ {
        proxy_pass http://gpos_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- Staff login shortcut ----
    location = /login {
        return 302 /pos/login$is_args$args;
    }

    location ^~ /login/ {
        return 302 /pos/login$is_args$args;
    }

    # ---- Old admin bookmarks without /pos prefix ----
    location ~ ^/(dashboard|inventory|khata|vendors|payables|purchases|reports|settings)(/.*)?$ {
        return 301 /pos$uri;
    }

    # ---- Coming soon (domain root) ----
    location / {
        root /opt/gpos/deploy/www;
        try_files $uri $uri/ /index.html;
    }
}
